name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
    # Defaults are [opened, synchronize, reopened]. Add ready_for_review
    # so a draft -> ready transition re-runs CI without an empty push;
    # keep synchronize explicit so every new commit on the PR triggers a
    # fresh run.
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# The committed go.work is a local dev-loop convenience (library + every
# standalone example module in one workspace). CI builds with it off so every
# step resolves like a real consumer: the library on its own, and each example
# against its own go.mod + replace.
env:
  GOWORK: off
  CGO_ENABLED: "0"

jobs:
  libetcd:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # x64 + arm64 across linux, windows, and macos, all pinned to discrete
        # image labels (no *-latest aliases) so every cell names an explicit
        # version — the GitHub-hosted ARM runners (free for public repos) only
        # exist as discrete labels, so pinning the rest keeps the matrix
        # consistent. macos-26-intel is x64 (Intel), macos-26 is arm64 (Apple
        # Silicon). Bumping an image label renames its check context, so update
        # the branch-protection required contexts when bumping. gofmt runs
        # Linux-only (see below), covering both Linux cells.
        os:
          - ubuntu-24.04
          - windows-2025
          - ubuntu-24.04-arm
          - windows-11-arm
          - macos-26-intel
          - macos-26
        # "min" reads the floor from go.mod (the `go X.Y` directive); "stable"
        # is whatever setup-go's `stable` alias resolves to. Keeping "min"
        # symbolic avoids drift between go.mod and the workflow when the floor
        # is bumped.
        go: [min, stable]
    defaults:
      run:
        # bash on Windows runners comes from git-for-windows (MSYS) and matches
        # the Linux job's shell semantics, so steps below don't need per-OS
        # branching for $(...) / [ -n ... ] / piping.
        shell: bash
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: resolve go version
        id: goversion
        # "min" → the `go X.Y` directive in go.mod (the declared floor).
        # Anything else (e.g. "stable") passes through unchanged so setup-go's
        # aliases keep working.
        run: |
          if [ "${{ matrix.go }}" = "min" ]; then
            v=$(awk '/^go [0-9]/ {print $2; exit}' go.mod)
            echo "version=$v" >> "$GITHUB_OUTPUT"
          else
            echo "version=${{ matrix.go }}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ steps.goversion.outputs.version }}
          cache: true

      - name: gofmt
        # Linux-only: actions/checkout on Windows normalizes line endings to
        # CRLF, which gofmt flags on every file. The Linux cells already
        # enforce gofmt on the canonical LF tree.
        if: runner.os == 'Linux'
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then
            echo "::error::gofmt found unformatted files:"
            echo "$out"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: go build
        run: go build ./...

      - name: lib tests
        run: go test ./v1alpha1/...

      # Each example is its own module (own go.mod + replace ../..); root
      # `go build ./...` doesn't descend into them, so build each on its own to
      # catch breakage — the same path a user copying the example out would hit.
      - name: build examples (standalone modules)
        shell: bash
        run: |
          for d in examples/*/; do
            echo "== building $d =="
            (cd "$d" && go build -o /dev/null ./...) || exit 1
          done

      - name: e2e
        # The e2e suite boots real etcd nodes (the tunnel tests also dial real
        # Cloudflare tunnels — slow, network-flaky), so it runs on just a few
        # variants — the stable-Go ubuntu-24.04, windows-2025, and macos-26 (one
        # per OS). LIBETCD_E2E=1 un-skips it there; every other cell skips the
        # whole suite (see gateE2E). Examples are still *built* on every cell by
        # the step above. e2e is its own module (it imports libtunnel, which the
        # library module must not), so run it from its own directory.
        env:
          LIBETCD_E2E: ${{ (matrix.go == 'stable' && (matrix.os == 'ubuntu-24.04' || matrix.os == 'windows-2025' || matrix.os == 'macos-26')) && '1' || '0' }}
        working-directory: e2e
        run: go test -count=1 -v ./...

  # Build, publish, and deploy the discovery seed (cmd/disco) — a standalone
  # container fronted by rowdy as the Lambda behind libetcd.nuss.io. Kept
  # independent of the libetcd matrix above (cmd/disco is its own module and
  # imports none of the library), so a tunnel/e2e flake never blocks a seed
  # deploy, and the seed ships on its own cadence. Build-only on PRs; push +
  # deploy on main / tags. Pinned action SHAs match the rest of this workflow.
  disco:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # push the image to GHCR
      id-token: write   # OIDC: GHCR login + rowdy's AWS role assumption
    env:
      REGISTRY: ghcr.io
      AWS_ROLE_ARN: ${{ vars.AWS_ROLE_ARN }}
    defaults:
      run:
        working-directory: cmd/disco
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: stable
          cache: true
          # setup-go runs at the repo root; point it at this module's go.sum.
          cache-dependency-path: cmd/disco/go.sum

      # Fast Go gate before the slower image build (the Dockerfile compiles, but
      # doesn't vet). GOWORK=off (workflow env) resolves the module on its own.
      - name: go vet
        run: go vet ./...

      - name: go build
        run: go build ./...

      - name: set up docker buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: extract metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6
        with:
          # Namespace disco by TAG, not by an extra path level: a /disco
          # sub-image makes the mirrored ECR repo three levels deep
          # (libetcd/disco), which trips up the deploy. Keep the bare repo image
          # and prefix every tag with "disco-" instead.
          images: ${{ env.REGISTRY }}/${{ github.repository }}
          tags: |
            type=raw,value=disco-latest,enable={{is_default_branch}}
            type=raw,value=disco-${{ github.sha }}

      - name: build and push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          # context is workspace-relative (working-directory affects run steps
          # only); the Dockerfile lives at cmd/disco/Dockerfile.
          context: cmd/disco
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: deploy to AWS Lambda
        if: github.event_name != 'pull_request'
        # Pinned to the tip of rowdy's floating `github` dist branch; re-pin to
        # pull in rowdy updates.
        uses: scaffoldly/rowdy@47a1b6d25a4187ba3ff998c15ebec79b86e9be5c # github
        with:
          cloud: aws
          compute: lambda
          image: ${{ env.REGISTRY }}/${{ github.repository }}:disco-latest
          memory: 512
          routes: ./cmd/disco/routes.yml
          secrets: ${{ toJSON(secrets) }}

  release:
    needs: [libetcd]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    runs-on: ubuntu-latest
    permissions:
      contents: write   # push tag + create release
      id-token: write   # cosign keyless signing via OIDC
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: resolve tag
        id: tag
        run: |
          set -euo pipefail

          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            # Manual tag push (minor/major bumps): use the tag as-is.
            echo "tag=${GITHUB_REF_NAME}"      >> "$GITHUB_OUTPUT"
            echo "needs_push=false"            >> "$GITHUB_OUTPUT"
            echo "skip=false"                  >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # main push: skip release if the commit opted out or already has a tag.
          # Token must sit alone on its own line so prose mentioning it inline
          # (subjects, doc paragraphs) doesn't accidentally suppress the release.
          msg=$(git log -1 --pretty=%B)
          if grep -qE '^[[:space:]]*\[skip release\][[:space:]]*$' <<<"$msg"; then
            echo "skip=true" >> "$GITHUB_OUTPUT"; exit 0
          fi
          if git tag --points-at HEAD | grep -q '^v'; then
            echo "skip=true" >> "$GITHUB_OUTPUT"; exit 0
          fi

          # Auto-bump patch from the latest v* tag (default v0.0.1 for first release).
          latest=$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -1)
          if [ -z "$latest" ]; then
            next="v0.0.1"
          else
            IFS=. read -r major minor patch <<<"${latest#v}"
            next="v${major}.${minor}.$((patch + 1))"
          fi
          echo "tag=${next}"      >> "$GITHUB_OUTPUT"
          echo "needs_push=true"  >> "$GITHUB_OUTPUT"
          echo "skip=false"       >> "$GITHUB_OUTPUT"

      - name: push tag
        if: steps.tag.outputs.skip != 'true' && steps.tag.outputs.needs_push == 'true'
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git tag "${{ steps.tag.outputs.tag }}"
          git push origin "${{ steps.tag.outputs.tag }}"

      - name: create github release
        if: steps.tag.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.tag.outputs.tag }}" \
            --title "${{ steps.tag.outputs.tag }}" \
            --generate-notes

      - name: install cosign
        if: steps.tag.outputs.skip != 'true'
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: sign source archives
        if: steps.tag.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          tag="${{ steps.tag.outputs.tag }}"
          repo="${GITHUB_REPOSITORY}"
          mkdir -p dist

          # Pull the auto-generated source archives that GitHub publishes
          # alongside every tag, then sign them with cosign in keyless mode
          # (OIDC -> Fulcio cert -> Rekor transparency log). The signature,
          # cert, and Rekor entry are bundled in a single .sigstore file.
          for ext in tar.gz zip; do
            curl -fsSL "https://github.com/${repo}/archive/refs/tags/${tag}.${ext}" \
              -o "dist/${tag}.${ext}"
            cosign sign-blob --yes \
              --bundle "dist/${tag}.${ext}.sigstore" \
              "dist/${tag}.${ext}"
          done

          gh release upload "${tag}" \
            "dist/${tag}.tar.gz.sigstore" \
            "dist/${tag}.zip.sigstore"

      - name: warm proxy.golang.org
        if: steps.tag.outputs.skip != 'true'
        run: |
          tag="${{ steps.tag.outputs.tag }}"
          mod="github.com/${GITHUB_REPOSITORY}"
          curl -fsSL "https://proxy.golang.org/${mod}/@v/${tag}.info" >/dev/null
          curl -fsSL "https://proxy.golang.org/${mod}/@v/${tag}.mod"  >/dev/null
          curl -fsSL "https://sum.golang.org/lookup/${mod}@${tag}"    >/dev/null
