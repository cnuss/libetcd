name: disco

# Build, publish, and deploy the discovery seed (cmd/disco) — a standalone
# container fronted by rowdy as the Lambda behind disco.nuss.io. Split out of
# the libetcd workflow (cmd/disco is its own module and imports none of the
# library) so a tunnel/e2e flake never blocks a seed deploy and the seed ships
# on its own cadence. Build-only on PRs; push + deploy on main / tags.
on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GOWORK: off
  CGO_ENABLED: "0"

jobs:
  # Cheap gate: read the real HEAD commit message and skip the build/deploy when
  # it carries [skip-disco]. Job-level skip (not a workflow-level filter) so a
  # required `disco` check still reports — see the libetcd.yml guard for the
  # full rationale.
  guard:
    runs-on: ubuntu-latest
    outputs:
      run: ${{ steps.check.outputs.run }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - id: check
        shell: bash
        run: |
          # Token alone on its own line so an inline prose mention doesn't skip
          # CI — see the libetcd.yml guard.
          msg=$(git log -1 --pretty=%B)
          if grep -qE '^[[:space:]]*\[skip-disco\][[:space:]]*$' <<<"$msg"; then
            echo "::notice::[skip-disco] — skipping disco CI"
            echo "run=false" >> "$GITHUB_OUTPUT"
          else
            echo "run=true" >> "$GITHUB_OUTPUT"
          fi

  disco:
    needs: guard
    if: needs.guard.outputs.run == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # push the image to GHCR
      id-token: write   # OIDC: GHCR login + rowdy's AWS role assumption
    env:
      REGISTRY: ghcr.io
      AWS_ROLE_ARN: ${{ vars.AWS_ROLE_ARN }}
    defaults:
      run:
        working-directory: cmd/disco
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: stable
          cache: true
          # setup-go runs at the repo root; point it at the cmd modules' sums.
          cache-dependency-path: |
            cmd/disco/go.sum
            cmd/etcdinit/go.sum

      # Fast Go gate before the slower image build (the Dockerfile compiles, but
      # doesn't vet). GOWORK=off (workflow env) resolves each module on its own.
      - name: go vet
        run: go vet ./...

      - name: go vet (etcdinit)
        working-directory: cmd/etcdinit
        run: go vet ./...

      - name: go build
        run: go build ./...

      # Hermetic tests (mock OIDC issuer for JWT verify). The kvdb live test
      # skips without DISCO_KVDB_* env, which isn't set here, so nothing reaches
      # out to kvdb.io.
      - name: go test
        run: go test ./...

      - name: set up docker buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: extract metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6
        with:
          # Namespace disco by TAG, not by an extra path level: a /disco
          # sub-image makes the mirrored ECR repo three levels deep
          # (libetcd/disco), which trips up the deploy. Keep the bare repo image
          # and prefix every tag with "disco-" instead.
          images: ${{ env.REGISTRY }}/${{ github.repository }}
          tags: |
            type=raw,value=disco-latest,enable={{is_default_branch}}
            type=raw,value=disco-${{ github.sha }}

      - name: build and push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          # context is workspace-relative (working-directory affects run steps
          # only); the Dockerfile lives at cmd/Dockerfile and builds every
          # cmd/* binary (disco entrypoint + etcdinit) into one image.
          context: cmd
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: deploy to AWS Lambda
        if: github.event_name != 'pull_request'
        # Pinned to the tip of rowdy's floating `github` dist branch; re-pin to
        # pull in rowdy updates.
        uses: scaffoldly/rowdy@47a1b6d25a4187ba3ff998c15ebec79b86e9be5c # github
        with:
          cloud: aws
          compute: lambda
          image: ${{ env.REGISTRY }}/${{ github.repository }}:disco-latest
          memory: 512
          routes: ./cmd/disco/routes.yml
          secrets: ${{ toJSON(secrets) }}
