name: E2E Fleet

# Multi-runner acceptance test for ad-hoc discovery (#94, #108): N nodes, each on
# its own runner behind a REAL Cloudflare tunnel, all forming one cluster through
# the live discovery seed (disco.nuss.io) by identical config. Proves cross-NAT,
# zero-topology-knowledge clustering end to end — the thing TestMultiNodeTunnel
# can only show in-process on a single runner.
#
# Manual only: it dials real tunnels across several runners and hits the live
# seed, so it is never on the per-commit path. Trigger it from the Actions tab.
on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # cnuss/actions-identity mints each runner's GitHub OIDC token

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GOWORK: off
  CGO_ENABLED: "0"

jobs:
  fleet:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    strategy:
      fail-fast: false
      # One job per node. NODE_COUNT below MUST equal this list's length — bump
      # both together to resize the fleet.
      matrix:
        node: [1, 2, 3]
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: stable
          cache: true
          # The e2e suite is its own module (it imports libtunnel, which the
          # library module must not); point setup-go at its go.sum.
          cache-dependency-path: e2e/go.sum

      # Mint this runner's GitHub Actions OIDC token. Every runner in the run gets
      # a DISTINCT token but the SAME sub (repo + ref), so the seed namespaces
      # them into one cluster — the exact scenario #122 fixed. disco trusts the
      # GitHub issuer (cmd/disco/main.go) and doesn't check audience
      # (SkipClientIDCheck), so the default aud is fine — no id-token-audience set.
      - id: identity
        uses: cnuss/actions-identity@v1

      - name: fleet node ${{ matrix.node }}
        working-directory: e2e
        env:
          LIBETCD_E2E_FLEET: "1"
          # TODO: passing the fleet size explicitly (and keeping it in sync with
          # the matrix length) is interim — we'll derive N a different way later.
          # Prove this hardcoded path works first.
          NODE_COUNT: "3" # keep in sync with matrix.node length
          LIBETCD_CLUSTER_TOKEN: ${{ steps.identity.outputs.id-token }}
        # -run pins to the fleet test; the rest of the e2e suite stays gated off
        # (no LIBETCD_E2E here). -count=1 defeats the test cache.
        run: go test -count=1 -run TestDiscoveryFleet -v -timeout 8m ./...
